name: create-db-users

on:

  pull_request:

    types: [closed]

jobs:

  create-user:

    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    permissions:

      id-token: write

      contents: read

    steps:

      - uses: actions/checkout@v4

      - name: login to gcp

        uses: google-github-actions/auth@v2

        with:

          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}

          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: setup gcloud

        uses: google-github-actions/setup-gcloud@v3

      - name: get cloud sql proxy

        run: |

          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.21.1/cloud-sql-proxy.linux.amd64

          chmod +x cloud-sql-proxy

      - name: start proxy

        run: |

          ./cloud-sql-proxy ${{ secrets.CLOUD_SQL_INSTANCE }} --port 5432 &

          sleep 10

      - name: install psql

        run: |

          sudo apt-get update

          sudo apt-get install -y postgresql-client

      - name: run script

        env:

          PGUSER: ${{ secrets.PGUSER }}

          PGDATABASE: ${{ secrets.PGDATABASE }}

          PGPASSWORD: ${{ secrets.PGPASSWORD }}

          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

        run: bash scripts/create-user.sh
 
